name: Run Telegram Bot Lifetime

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *' # Har 5 ghante mein automatically restart hoga taaki hamesha chalta rahe

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot pyTelegramBotAPI pyrogram telethon tgcrypto gTTS qrcode requests yt-dlp database-client pytz AsyncAndroid

    - name: Run Bot Script
      run: |
        python Genoshu.py
